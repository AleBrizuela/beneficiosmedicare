<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beneficios Medicare - Your Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1E3A5F; --green: #00796B; --blue: #2E6BA4;
  --teal: #00897B; --mint: #B2DFDB;
  --lt-blue: #D6EAF7; --lt-green: #E0F2F1;
  --lt-mint: #E0F2F1; --lt-gray: #F3F5F7;
  --gray: #5A6577; --dark: #1C2B3A; --white: #FFFFFF;
  --sage: #00897B; --sage-dark: #00796B; --slate: #3D5A80;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(30,58,95,0.10);
  --shadow-lg: 0 8px 40px rgba(30,58,95,0.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',-apple-system,sans-serif;background:linear-gradient(135deg,#E0F2F1 0%,#D6EAF7 50%,#E0F2F1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body.in-iframe{padding:0;min-height:auto;background:var(--white);align-items:flex-start}
body.in-iframe .widget-wrap{border-radius:0;box-shadow:none}
body.in-iframe .widget-header{display:none}
body.in-iframe .widget-footer{display:none}
body.in-iframe .widget-body{padding-top:10px;padding-bottom:4px}
body.in-iframe .bot-msg{font-size:16px;padding:2px 0 8px}
.widget-wrap{width:100%;max-width:480px;background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden;position:relative}

/* ── LANG BUBBLE ── */
.lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden;margin-left:auto;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.lang-toggle button{padding:6px 12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:rgba(255,255,255,.6);letter-spacing:.03em}
.lang-toggle button.active{background:rgba(255,255,255,.95);color:var(--navy);border-radius:6px}
.lang-toggle button:hover:not(.active){background:rgba(255,255,255,.1);color:white}

/* ── HEADER ── */
.widget-header{background:linear-gradient(135deg,var(--navy) 0%,var(--slate) 100%);padding:14px 20px 12px;color:white;display:flex;align-items:center;gap:12px}
.widget-header .logo-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.widget-header h2{font-size:18px;font-weight:600;line-height:1.2}
.widget-header p{font-size:13px;opacity:.8;margin-top:2px}

/* ── PROGRESS ── */
.progress-bar{height:4px;background:rgba(0,0,0,.05)}
.progress-fill{height:100%;background:var(--sage);transition:width .4s ease;border-radius:0 2px 2px 0}

/* ── BODY ── */
.widget-body{padding:18px 22px 8px}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.widget-body>*{animation:fadeUp .3s ease}

/* ── BOT MSG ── */
.bot-msg{background:none;border-radius:0;padding:4px 0 12px;margin-bottom:6px;font-size:17px;font-weight:400;line-height:1.5;color:#3c4043;text-align:center}
.bot-msg strong{font-weight:600;color:inherit}
.bot-msg.plain{background:none;border-radius:0;padding:4px 0 10px;font-size:22px;font-weight:600;color:#202124;text-align:center}
.bot-msg.hl{background:#f8f9fa;border-left:3px solid var(--sage);padding:10px 14px;border-radius:8px;text-align:left;font-size:14px;font-weight:400;color:#5f6368}

/* ── OPT CARDS ── */
.opt-grid{display:flex;flex-direction:column;gap:10px}
.opt-card{display:flex;align-items:center;gap:14px;padding:16px 16px;border:1.5px solid #dadce0;border-radius:var(--radius);cursor:pointer;transition:all .15s;background:var(--white);min-height:64px}
.opt-card:hover{border-color:var(--sage);background:#f8faf9;box-shadow:0 1px 6px rgba(60,64,67,.08)}
.opt-card:active{transform:scale(.98)}
.opt-card .ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ic.bl{background:var(--lt-blue)}.ic.gr{background:var(--lt-green)}.ic.mi{background:var(--lt-mint)}.ic.sg{background:var(--lt-mint)}
.opt-card .tx h4{font-size:15px;font-weight:600;color:#202124;margin-bottom:2px}
.opt-card .tx p{font-size:13px;color:#5f6368;line-height:1.45}
.opt-card .bg{margin-left:auto;font-size:10px;font-weight:600;padding:4px 9px;border-radius:6px;letter-spacing:.03em;white-space:nowrap;flex-shrink:0}
.bg.st{background:#fef7e0;color:#b06000}.bg.ch{background:#e8f0fe;color:#1a73e8}
.bg.co{background:#e6f4ea;color:#137333}.bg.le{background:#f3e8fd;color:#8430ce}

/* ── INPUTS ── */
.input-group{margin-bottom:14px;text-align:center}
.input-group label{display:block;font-size:13px;font-weight:500;color:#5f6368;margin-bottom:6px;text-align:center}
.input-field{width:auto;min-width:180px;max-width:260px;padding:14px 16px;border:1.5px solid #dadce0;border-radius:var(--radius);font-size:18px;font-family:inherit;color:#202124;transition:border-color .2s;text-align:center;display:block;margin:0 auto}
.input-field:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(0,137,123,.15)}
.input-field::placeholder{color:#A0AEC0}
.input-group.zip-group .input-field{width:140px;min-width:140px;font-size:22px;letter-spacing:3px}

/* ── BUTTONS ── */
.btn-p{width:100%;padding:16px;background:var(--sage);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:52px}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,137,123,.3)}.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-s{width:100%;padding:14px;background:transparent;color:var(--sage);border:1.5px solid #dadce0;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:50px}
.btn-s:hover{background:var(--lt-mint)}
.btn-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--gray);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:12px;padding:6px 0;min-height:36px}
.btn-back:hover{color:var(--dark)}
.btn-ghost{background:none;border:none;color:#1a73e8;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;padding:10px 0;text-decoration:none;min-height:44px}
.btn-remind{width:100%;padding:14px;background:var(--lt-blue);color:var(--blue);border:2px solid var(--lt-blue);border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:50px}
.btn-remind:hover{border-color:var(--blue)}
.btn-skip{display:block;width:100%;text-align:center;background:none;border:none;color:#999;font-size:13px;cursor:pointer;font-family:inherit;padding:10px 0;margin-top:4px;text-decoration:underline;text-underline-offset:2px;min-height:36px}
.btn-skip:hover{color:var(--gray)}

/* ── INFO CARDS ── */
.info-card{background:#f8f9fa;border-radius:var(--radius);padding:16px;margin-bottom:12px}
.info-card h4{font-size:14px;font-weight:600;color:#202124;margin-bottom:5px}
.info-card p{font-size:14px;color:#3c4043;line-height:1.55}
.info-card.bl{background:#f8f9fa}.info-card.bl h4{color:#202124}

/* ── CONDITION CHIPS (Option B) ── */
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cond-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:1.5px solid #dadce0;border-radius:var(--radius);cursor:pointer;transition:all .15s;background:var(--white);text-align:center;min-height:70px}
.cond-chip:hover{border-color:var(--sage);background:#f8faf9}
.cond-chip:active{transform:scale(.97)}
.cond-chip.sel{border-color:var(--sage);background:var(--sage);color:white}
.cond-chip .cond-icon{font-size:24px;line-height:0}
.cond-chip .cond-label{font-size:13px;font-weight:500;line-height:1.3}
.cond-chip.sel .cond-label{color:white}
.cond-chip.sel .cond-icon svg{filter:brightness(0) invert(1)}
.health-textarea{width:100%;padding:12px 14px;border:2px solid #E2E8F0;border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--dark);resize:vertical;min-height:70px;transition:border-color .2s}
.health-textarea:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(0,137,123,.15)}
.health-textarea::placeholder{color:#A0AEC0}

/* ── RANK BADGES (priority step) ── */
.opt-card{position:relative}
.rank-badge{position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;background:var(--sage);color:white;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,137,123,.3);animation:popIn .25s ease}
.opt-card.ranked{border-color:var(--sage);background:var(--lt-mint)}

/* ── PLAN CARDS ── */
.plan-card{border:1.5px solid #dadce0;border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all .2s;position:relative;border-left:4px solid #dadce0}
.plan-card:hover{box-shadow:0 1px 6px rgba(60,64,67,.1)}
.plan-card.rec{border-color:var(--sage);background:#f8faf9;border-left-color:var(--sage)}
.plan-label{position:absolute;top:-10px;right:10px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;letter-spacing:.02em}
.plan-label.best-match{background:var(--sage);color:white}
.plan-label.best-value{background:#1a73e8;color:white}
.plan-label.most-benefits{background:#8430ce;color:white}
.plan-label.top-rated{background:#ea8600;color:white}
.plan-card h4{font-size:15px;font-weight:600;color:#202124;margin-bottom:3px}
.plan-card .carrier{font-size:13px;color:#5f6368;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.carrier-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.plan-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #EDF2F7}
.plan-row:last-child{border:none}
.plan-row .lb{color:#5f6368}.plan-row .vl{font-weight:500;color:#202124}
.plan-row .vl.gd{color:#137333}
.plan-cta{width:100%;padding:14px;margin-top:10px;border:1.5px solid #dadce0;background:var(--white);color:var(--sage);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;min-height:50px}
.plan-cta:hover{background:var(--sage);color:white}
.plan-cta.filled{background:var(--sage);color:white}
.plan-cta.filled:hover{background:var(--sage-dark)}

/* ── PLAN SELECT CHECKBOX ── */
.plan-sel{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:2px solid #CBD5E0;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .15s;z-index:2}
.plan-sel:hover{border-color:var(--sage)}
.plan-sel.checked{background:var(--sage);border-color:var(--sage);color:white}

/* ── TYPE FILTER + SORT BAR ── */
.type-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding:0 2px}
.type-pill{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border:1.5px solid #dadce0;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;background:var(--white);color:#5f6368;transition:all .15s;font-family:inherit;white-space:nowrap}
.type-pill:hover{border-color:var(--sage);color:var(--sage)}
.type-pill.active{background:var(--sage);color:white;border-color:var(--sage)}
.type-count{font-size:11px;font-weight:700;background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px}
.type-pill.active .type-count{background:rgba(255,255,255,.25)}
.sort-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:0 2px}
.sort-pill{padding:6px 10px;border:1.5px solid #dadce0;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;background:var(--white);color:#5f6368;transition:all .15s;font-family:inherit;white-space:nowrap}
.sort-pill:hover{border-color:var(--sage);color:var(--sage)}
.sort-pill.active{background:var(--sage);color:white;border-color:var(--sage)}
.compare-float{position:sticky;bottom:0;left:0;right:0;background:white;padding:10px 0 4px;border-top:1px solid #EDF2F7;margin-top:12px;text-align:center}

/* ── COMPARE TABLE ── */
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.compare-table th{background:#f8f9fa;color:#202124;padding:9px 6px;text-align:center;font-weight:600;font-size:12px;border-bottom:1px solid #dadce0}
.compare-table th:first-child{text-align:left;color:#5f6368}
.compare-table td{padding:8px 6px;border-bottom:1px solid #f1f3f4;text-align:center;color:#3c4043}
.compare-table td:first-child{text-align:left;color:#5f6368;font-weight:400}
.compare-table tr:hover td{background:#f8f9fa}

/* ── COMPARE ROW ── */
.cmp-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #EDF2F7;font-size:15px}
.cmp-row:last-child{border:none}
.cmp-lb{color:#5f6368}.cmp-vl{font-weight:500;color:#202124}

/* ── SUCCESS ── */
.success-icon{width:88px;height:88px;background:linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(76,175,80,.25);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.success-wrap{text-align:center;padding:20px 8px 12px}
.success-title{color:#202124;font-size:21px;font-weight:600;margin:0 0 4px;line-height:1.3}
.success-subtitle{color:#5f6368;font-size:14px;font-weight:400;margin:0 0 16px}
.success-bullets{text-align:left;background:var(--lt-gray);border-radius:var(--radius);padding:14px 16px;margin:0 0 16px;list-style:none}
.success-bullets li{font-size:14px;color:#2D3748;line-height:1.5;padding:5px 0;display:flex;align-items:flex-start;gap:8px}
.success-bullets li span.sb-icon{flex-shrink:0;font-size:16px;margin-top:1px}
.success-cta{display:inline-block;background:var(--sage);color:white;font-size:15px;font-weight:600;padding:13px 28px;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:12px}
.success-cta:hover{background:#1A8A6E;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,138,110,.3)}
.success-links{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.success-links button{background:none;border:none;color:var(--navy);font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;padding:4px}

/* ── FOOTER ── */
.widget-footer{padding:8px 18px 10px;text-align:center;font-size:11px;color:var(--gray);line-height:1.45;border-top:1px solid #EDF2F7}
.widget-footer a{color:var(--blue);text-decoration:none}

/* ── TRUST BAR ── */
.trust-bar{display:flex;justify-content:center;gap:16px;margin-top:8px;padding-bottom:0;font-size:12px;color:#888}
.trust-bar span{display:flex;align-items:center;gap:4px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  body{padding:0;align-items:flex-start}
  .widget-wrap{border-radius:0;min-height:100vh}
  .widget-body{padding:20px 18px}
  .bot-msg{font-size:17px;padding:4px 0 12px}
  .opt-card{padding:16px 14px;min-height:64px}
  .opt-card .ic{width:44px;height:44px;font-size:22px}
  .opt-card .tx h4{font-size:15px}
  .opt-card .tx p{font-size:13px}
  .input-field{padding:14px 16px;font-size:18px}
  .btn-p{padding:16px;font-size:16px;min-height:52px}
  .btn-s{padding:14px;font-size:15px;min-height:48px}
  .plan-row{font-size:14px;padding:7px 0}
  .plan-card h4{font-size:15px}
  .plan-cta{padding:14px;font-size:15px;min-height:50px}
  .cond-chip{padding:16px 8px;min-height:76px}
  .cond-chip .cond-icon{font-size:26px}
  .cond-chip .cond-label{font-size:14px}
}
</style>
</head>
<body>
<div class="widget-wrap">
  <div class="widget-header">
    <div class="logo-icon">&#x1F6E1;</div>
    <div><h2 id="hdr-title">Your Guide</h2><p id="hdr-sub">Beneficios Medicare</p></div>
    <div class="lang-toggle" id="lang-toggle">
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <button id="lang-es" onclick="setLang('es')">ES</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="widget-body" id="wb"></div>
  <div class="widget-footer" id="wf">
    This website is not part of the federal government or the Medicare program.
    For official information visit <a href="https://www.medicare.gov" target="_blank">Medicare.gov</a> or call 1-800-Medicare.
  </div>
</div>
<script>
// ═══════════════════════════════════════
// WIDGET v4 - REDESIGNED
// ═══════════════════════════════════════

const _params=new URLSearchParams(location.search);
let lang=_params.get('lang')==='es'?'es':'en', hist=[], D={}, selConds=[], priRank=[], selPlans=[], _submitting=false;
const _initZip=_params.get('zip')||'';
if(_initZip && /^\d{5}$/.test(_initZip)){
  D.zip=_initZip;
  // Pre-load plan data for the initial ZIP
  setTimeout(()=>loadPlansForZip(_initZip),0);
}

// ── EXPERIMENT LOADER ──
// Usage: ?exp=drug-names (single) or ?exp=drug-names,other-exp (comma-separated)
const _expParam=_params.get('exp')||'';
const _activeExps=_expParam?_expParam.split(',').map(s=>s.trim()).filter(Boolean):[];
const _expModules={};  // loaded experiment step functions keyed by id

// Load experiment module scripts
_activeExps.forEach(expId=>{
  const s=document.createElement('script');
  s.src='experiments/'+expId+'/module.js';
  s.onerror=()=>console.warn('Experiment module not found:',expId);
  document.head.appendChild(s);
});

// Generic experiment step runner: inserts experiment steps after health, before nextFn
// Checks at CALL TIME (not definition time) so dynamically loaded scripts are found
function _runExperiments(nextFn){
  const EXP_REGISTRY={
    'drug-names':'expDrugNames'
  };
  for(const expId of _activeExps){
    const fnName=EXP_REGISTRY[expId]||('exp_'+expId.replace(/-/g,'_'));
    if(typeof window[fnName]==='function'){
      window[fnName](lang, D, ()=>go(nextFn));
      return true;
    }
  }
  return false;
}
// Wrapper: run experiments if active, otherwise go directly to nextFn
function expOrNext(nextFn){
  if(_activeExps.length>0 && _runExperiments(nextFn)) return;
  go(nextFn);
}

// ── THEME ENGINE ──
// Usage: ?theme=california  (or omit for default beneficiosmedicare theme)
const THEMES = {
  default: {}, // uses CSS :root as-is
  california: {
    '--sage':      '#0080D4',
    '--sage-dark': '#0068B0',
    '--navy':      '#1a1a1a',
    '--slate':     '#4a4a4a',
    '--lt-mint':   '#E8F2FC',
    '--lt-green':  '#E8F2FC',
    '--mint':      '#B3D4F0',
    '--teal':      '#0080D4',
    '--green':     '#0068B0',
    '--blue':      '#3D9BE9',
    '--lt-blue':   '#E8F2FC',
  }
};
const _theme = _params.get('theme') || 'default';
if (THEMES[_theme] && _theme !== 'default') {
  const r = document.documentElement.style;
  Object.entries(THEMES[_theme]).forEach(([k, v]) => r.setProperty(k, v));
  // Also update hardcoded colors that reference sage/teal
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    .opt-card:hover { border-color: var(--sage) !important; background: #f0f7fd !important; }
    .input-field:focus { border-color: var(--sage) !important; box-shadow: 0 0 0 3px rgba(0,128,212,.12) !important; }
    .health-textarea:focus { border-color: var(--sage) !important; box-shadow: 0 0 0 3px rgba(0,128,212,.12) !important; }
    .btn-p:hover { box-shadow: 0 4px 16px rgba(0,128,212,.3) !important; }
    .plan-card.rec { background: #f0f7fd !important; }
    .opt-card.ranked { background: #f0f7fd !important; }
    .cond-chip:hover { border-color: var(--sage) !important; background: #f0f7fd !important; }
    .cond-chip.sel { background: var(--sage) !important; border-color: var(--sage) !important; }

// ── PLAN DATA ENGINE ──
// CMS data is loaded dynamically per state. PLANS starts empty; populated after ZIP lookup.
let PLANS = [];
let _cmsData = null;
let _cmsLoadedState = null;

// No fallback plans -- only real CMS data is shown

// Map CMS plan to widget format
function cmsToWidget(p){
  const isPDP = p.cat==='PDP';
  const isMA = p.cat==='MA'||p.cat==='MA-PD';
  const isSNP = p.cat==='SNP';
  return {
    id: p.id,
    name: p.name,
    carrier: p.carrier,
    premium: p.premium,
    ded: p.deductible,
    moop: p.moop,
    dental: isPDP?0:1,
    vision: isPDP?0:1,
    hearing: isPDP?0:(p.has_drug?1:0),
    fitness: isPDP?0:1,
    otc: 0,
    drug: (isPDP||p.has_drug)?'Included':'N/A',
    giveback: 0,
    rating: p.stars || 3,
    type: p.type
  };
}

// Load CMS data for a state, returns promise
function loadCmsData(stateCode){
  if(_cmsLoadedState === stateCode && _cmsData) return Promise.resolve(_cmsData);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'data/cms_' + stateCode + '.js';
    s.onload = () => {
      if(typeof CMS_STATE_DATA !== 'undefined'){
        _cmsData = CMS_STATE_DATA;
        _cmsLoadedState = stateCode;
        resolve(_cmsData);
      } else reject(new Error('CMS data not found'));
    };
    s.onerror = () => reject(new Error('Failed to load CMS data for ' + stateCode));
    document.head.appendChild(s);
  });
}

// Load ZIP index (small file, maps ZIP to state code)
let _zipIndex = null;
function loadZipIndex(){
  if(_zipIndex) return Promise.resolve(_zipIndex);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'data/zip_index.js';
    s.onload = () => {
      if(typeof ZIP_INDEX !== 'undefined'){
        _zipIndex = ZIP_INDEX;
        resolve(_zipIndex);
      } else reject(new Error('ZIP index not found'));
    };
    s.onerror = () => reject(new Error('Failed to load ZIP index'));
    document.head.appendChild(s);
  });
}

// Main: look up plans for a ZIP code
async function loadPlansForZip(zip){
  try {
    const idx = await loadZipIndex();
    const state = idx[zip];
    if(!state) { D._zipValid=false; PLANS=[]; return; }
    const data = await loadCmsData(state);
    const info = data.zips?.[zip];
    if(!info) { D._zipValid=false; PLANS=[]; return; }
    const county = info.county;
    D.county = county;
    D.state = state;
    D._zipValid = true;
    // Get plans for this county + "All Counties" plans
    let raw = [...(data.plans?.[county] || []), ...(data.plans?.['All Counties'] || [])];
    // Dedupe by plan ID
    const seen = new Set();
    raw = raw.filter(p => { if(seen.has(p.id)) return false; seen.add(p.id); return true; });
    if(raw.length === 0) return;
    // Sort: best stars first, then lowest premium, then lowest MOOP
    raw.sort((a,b) => (b.stars||0)-(a.stars||0) || a.premium-b.premium || a.moop-b.moop);
    PLANS = raw.map(cmsToWidget);
  } catch(e) {
    console.warn('CMS data load failed:', e.message);
    PLANS=[];
  }
}

function formatDob(el){
  let raw=el.value.replace(/[^\d]/g,'');
  if(raw.length>8) raw=raw.slice(0,8);
  const mm=raw.slice(0,2), dd=raw.slice(2,4), yyyy=raw.slice(4,8);
  let v=mm;
  if(raw.length>2) v+=(' / '+dd);
  if(raw.length>4) v+=(' / '+yyyy);
  el.value=v;
  el.setSelectionRange(v.length,v.length);
}
function parseDob(){
  const v=document.getElementById('dobInput')?.value||'';
  const parts=v.replace(/\s/g,'').split('/');
  if(parts.length===3){
    const mm=+parts[0], dd=+parts[1], yy=+parts[2];
    if(mm>=1 && mm<=12 && dd>=1 && dd<=31 && yy>=1920 && yy<=2010){
      // Validate actual calendar date (catches Feb 30, Apr 31, etc.)
      const test=new Date(yy,mm-1,dd);
      if(test.getFullYear()!==yy||test.getMonth()!==mm-1||test.getDate()!==dd) return false;
      D.dob_month=parts[0];D.dob_day=parts[1];D.dob_year=parts[2];
      return true;
    }
  }
  return false;
}


// ── AGE / ENROLLMENT CALC ──
function getAge(){
  const m=+D.dob_month,d=+D.dob_day,y=+D.dob_year;
  if(!m||!d||!y)return null;
  const now=new Date();
  const bday=new Date(y,m-1,d);
  if(isNaN(bday.getTime()))return null;
  let age=now.getFullYear()-y;
  const thisYearBday=new Date(now.getFullYear(),m-1,d);
  if(now<thisYearBday)age--;
  return age;
}
function getEnrollmentWindow(){
  const m=+D.dob_month,d=+D.dob_day,y=+D.dob_year;
  if(!m||!d||!y||y<1900||y>2010)return null;
  let iepMonth=m-3, iepYear=y+65;
  if(iepMonth<=0){iepMonth+=12;iepYear--;}
  if(iepMonth<1||iepMonth>12)return null;
  return {month:iepMonth, year:iepYear};
}
function monthName(m){
  const en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const es=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const idx=Math.max(0,Math.min(11,(+m||1)-1));
  return (lang==='en'?en:es)[idx];
}
function timeAwayStr(months){
  if(months<=18){
    return lang==='en'?`about <strong>${months} months</strong> away`:`en aproximadamente <strong>${months} meses</strong>`;
  }
  const y=Math.floor(months/12), rm=months%12;
  if(lang==='en'){
    if(rm===0) return `about <strong>${y} year${y>1?'s':''}</strong> away`;
    return `about <strong>${y} year${y>1?'s':''} and ${rm} month${rm>1?'s':''}</strong> away`;
  } else {
    if(rm===0) return `en aproximadamente <strong>${y} a\u00F1o${y>1?'s':''}</strong>`;
    return `en aproximadamente <strong>${y} a\u00F1o${y>1?'s':''} y ${rm} mes${rm>1?'es':''}</strong>`;
  }
}

function scorePlans(){
  let plans=[...PLANS];
  const ranked=D.priorities&&D.priorities.length?D.priorities:[D.priority||'benefits'];
  plans.forEach(p=>{
    p.score=0;
    ranked.forEach((pri,idx)=>{
      const w=ranked.length-idx; // 1st pick gets highest weight
      if(pri==='cost')p.score+=w*((6000-p.moop)/1000+(p.premium===0?3:0)+(p.giveback>0?2:0));
      if(pri==='benefits'||pri==='all')p.score+=w*((p.dental+p.vision+p.hearing+p.fitness)+p.otc/50);
      if(pri==='drugs')p.score+=w*(p.drug==='Enhanced'?3:1);
      if(pri==='dental')p.score+=w*((p.dental?3:0)+(p.vision?2:0));
      if(pri==='wellness')p.score+=w*((p.fitness?3:0)+p.otc/30);
      if(pri==='doctor')p.score+=w*(p.type==='PPO'?3:1);
    });
    // Boost for matching conditions
    if(selConds.includes('vision')&&p.vision)p.score+=1;
    if(selConds.includes('bones')&&p.fitness)p.score+=1;
    p.score+=p.rating;
  });
  plans.sort((a,b)=>b.score-a.score);
  plans[0].label=lang==='en'?'Your Result':'Su Resultado';plans[0].labelCls='best-match';
  const bv=[...plans].sort((a,b)=>a.moop-b.moop)[0];
  if(bv.id!==plans[0].id){const p=plans.find(x=>x.id===bv.id);p.label=lang==='en'?'Lowest Cost':'Menor Costo';p.labelCls='best-value';}
  const mb=[...plans].sort((a,b)=>(b.dental+b.vision+b.hearing+b.fitness+b.otc/50)-(a.dental+a.vision+a.hearing+a.fitness+a.otc/50))[0];
  if(!mb.label){mb.label=lang==='en'?'Added Benefits':'Beneficios Adicionales';mb.labelCls='most-benefits';}
  const tr=[...plans].sort((a,b)=>b.rating-a.rating)[0];
  if(!tr.label){tr.label=lang==='en'?'High Rating':'Rating Alto';tr.labelCls='top-rated';}
  return plans;
}

// ── SORT / FILTER BAR ──
// ── PLAN TYPE FILTER ──
let _typeFilter='all';
function classifyType(t){
  if(!t) return 'ma';
  if(t==='PDP') return 'pdp';
  if(t.includes('SNP')) return 'snp';
  return 'ma'; // HMO, PPO, HMO-POS = Medicare Advantage
}
function typeFilterBar(allPlans){
  const counts={all:allPlans.length, ma:0, snp:0, pdp:0};
  allPlans.forEach(p=>{counts[classifyType(p.type)]++});
  const TYPES=[
    {id:'all', en:'All Plans',           es:'Todos'},
    {id:'ma',  en:'Medicare Advantage',  es:'Medicare Advantage'},
    {id:'snp', en:'Special Needs',       es:'Necesidades Especiales'},
    {id:'pdp', en:'Drug Plans (PDP)',    es:'Medicamentos (PDP)'},
  ];
  return `<div class="type-bar">${TYPES.filter(t=>counts[t.id]>0||t.id==='all').map(t=>
    `<button class="type-pill${_typeFilter===t.id?' active':''}" onclick="applyTypeFilter('${t.id}')">${t[lang]} <span class="type-count">${counts[t.id]}</span></button>`
  ).join('')}</div>`;
}
function filterByType(plans){
  if(_typeFilter==='all') return plans;
  return plans.filter(p=>classifyType(p.type)===_typeFilter);
}
function applyTypeFilter(type){
  _typeFilter=type;
  if(_inAllPlans) go(allPlans);
  else go(flowResults);
}

let _sortMode='best';
const SORT_MODES=[
  {id:'best',  en:'Your Result',    es:'Su Resultado'},
  {id:'cost',  en:'Lowest Cost',    es:'Menor Costo'},
  {id:'star',  en:'High Rating',    es:'Rating Alto'},
  {id:'drug',  en:'Drug Coverage',  es:'Cobertura de Medicinas'},
  {id:'extra', en:'Added Benefits',  es:'Beneficios Adicionales'},
];
function sortBar(){
  return `<div class="sort-bar">${SORT_MODES.map(m=>
    `<button class="sort-pill${_sortMode===m.id?' active':''}" onclick="applySortMode('${m.id}')">${m[lang]}</button>`
  ).join('')}</div>`;
}
function sortPlans(plans, mode){
  const s=[...plans];
  if(mode==='cost')  s.sort((a,b)=>(a.premium+a.moop)-(b.premium+b.moop));
  else if(mode==='star') s.sort((a,b)=>b.rating-a.rating||(a.premium-b.premium));
  else if(mode==='drug') s.sort((a,b)=>(b.drug==='Included'?1:0)-(a.drug==='Included'?1:0)||(b.rating-a.rating));
  else if(mode==='extra') s.sort((a,b)=>(b.dental+b.vision+b.hearing+b.fitness+b.otc/50)-(a.dental+a.vision+a.hearing+a.fitness+a.otc/50));
  // 'best' keeps scorePlans() order
  return s;
}
function applySortMode(mode){
  _sortMode=mode;
  // Re-render whichever results view is active
  if(_inAllPlans) go(allPlans);
  else go(flowResults);
}
let _inAllPlans=false;

async function flowResults(){
  prog(82); _inAllPlans=false;
  if(PLANS.length===0 && D.zip) await loadPlansForZip(D.zip);
  const scored=scorePlans();
  const filtered=filterByType(scored);
  const plans=_sortMode==='best'?filtered:sortPlans(filtered,_sortMode);
  D.conditions=[...selConds];
  const age=getAge();
  let note='';
  if(age!==null){

}

function flowCompare(){

  const ck='\u2705',no='\u274C';
  const rows=[
    [lang==='en'?'Premium':'Prima',...plans.map(p=>'$'+p.premium)],
    [lang==='en'?'Deductible':'Deducible',...plans.map(p=>'$'+p.ded)],
    [lang==='en'?'Max OOP':'Max Bolsillo',...plans.map(p=>'$'+p.moop.toLocaleString())],
    ['Dental',...plans.map(p=>p.dental?ck:no)],
    [lang==='en'?'Vision':'Visi\u00F3n',...plans.map(p=>p.vision?ck:no)],
    [lang==='en'?'Hearing':'Audici\u00F3n',...plans.map(p=>p.hearing?ck:no)],
    [lang==='en'?'Fitness':'Ejercicio',...plans.map(p=>p.fitness?ck:no)],
    [lang==='en'?'OTC Allowance':'OTC Mensual',...plans.map(p=>'$'+p.otc)],
    [lang==='en'?'Drugs':'Medicinas',...plans.map(p=>p.drug)],
    [lang==='en'?'Rating':'Calificaci\u00F3n',...plans.map(p=>'\u2B50 '+p.rating)],

  plans.forEach((p,i)=>{const s=p.name.split('(')[0].trim();tbl+=`<th>${s}${p.label?' \u2B50':''}</th>`;});

function submitLead(type){
  if(_submitting) return;
  _submitting=true;
  const btn=document.querySelector('.btn-p:not(:disabled)');
  if(btn){btn.disabled=true;btn.textContent=btn.textContent.includes('Obtener')?'Procesando...':'Processing...'}

  const name=D.fullName||document.getElementById('fullName')?.value||'';
  const phone=D.phone||document.getElementById('phone')?.value||'';
  const email=D.email||document.getElementById('email')?.value||'';
  const question=document.getElementById('question')?.value||'';

  const phoneClean = phone.replace(/\D/g,'');
  if(!name.trim() || name.trim().length < 2){
    alert(lang==='en'?'Please enter your full name.':'Por favor ingrese su nombre completo.');
    _submitting=false;
    if(btn){btn.disabled=false;btn.textContent=btn.textContent.includes('cesando')?lang==='en'?'Help Me Decide':'Ay\u00FAdeme a Decidir':lang==='en'?'Get Free Consultation':'Obtener Consulta Gratis'}
    return;
  }
  if(phoneClean.length < 10){
    alert(lang==='en'?'Please enter a valid 10-digit phone number.':'Por favor ingrese un n\u00FAmero de tel\u00E9fono v\u00E1lido de 10 d\u00EDgitos.');
    _submitting=false;
    if(btn){btn.disabled=false;btn.textContent=btn.textContent.includes('cesando')?lang==='en'?'Help Me Decide':'Ay\u00FAdeme a Decidir':lang==='en'?'Get Free Consultation':'Obtener Consulta Gratis'}
    return;
  }
  D.fullName=name;D.phone=phone;D.email=email;
  if(question) D.question=question;
  D.lang=lang;D.conditions=[...selConds];
  D.timestamp=new Date().toISOString();
  D.leadType=type;

  const host=window.location.hostname||'';
  const parentHost=(window.self!==window.top)?document.referrer:'';
  const path=window.location.pathname||'';
  if(parentHost.includes('medicare-california')||parentHost.includes('/california')||host.includes('medicare-california')||host.includes('california')||path.includes('/california')){
    D.source='medicare-california';
  } else {
    D.source='beneficiosmedicare';
  }
  D.url=parentHost||window.location.href;

  const parts=name.trim().split(/\s+/);
  D.firstName=parts[0]||'';
  D.lastName=parts.slice(1).join(' ')||'';

  const GS_URL='https://script.google.com/macros/s/AKfycbxgZUyi28Vg5ya__EAzfP3eR1BHmoRwzNva23evP2KzUfAlHtpIgihasIQi3-FFlU7k/exec';

  // Primary: try Google Sheets with CORS
  fetch(GS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(D)})
    .then(r=>{
      if(!r.ok) throw new Error('GS response '+r.status);
      console.log('[Widget] Lead saved to Google Sheets');
      _submitting=false;go(flowSuccess);
    })
    .catch(err=>{
      console.warn('[Widget] Google Sheets failed:',err.message,'. Trying fallback...');
      // Fallback: re-try with no-cors (send goes through even if response is opaque)
      fetch(GS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(D)})
        .then(()=>console.log('[Widget] Fallback no-cors sent'))
        .catch(()=>console.warn('[Widget] Fallback also failed'));
      // Email fallback via FormSubmit
      const fd=new FormData();
      fd.append('name',D.fullName);fd.append('phone',D.phone);
      fd.append('email',D.email||'N/A');fd.append('_subject','New Medicare Lead - '+D.source);
      fd.append('message','Type: '+D.leadType+' | ZIP: '+(D.zip||'N/A')+' | County: '+(D.county||'N/A')+' | Age: '+(D.age||'N/A')+' | Conditions: '+(D.conditions||[]).join(', ')+' | Lang: '+D.lang+' | Question: '+(D.question||'N/A'));
      fetch('https://formsubmit.co/ajax/brizuela@gmail.com',{method:'POST',body:fd})
        .then(()=>console.log('[Widget] Email fallback sent'))
        .catch(()=>console.warn('[Widget] Email fallback also failed'));
      _submitting=false;go(flowSuccess);
    });
}

      </div>
    </div>`;
  } else {
    wb().innerHTML=`<div class="success-wrap">
      <div class="success-icon">\u2705</div>
      <h3 class="success-title">\uD83C\uDF89 ${lang==='en'?'Great News, '+firstName+'!':'\u00A1Excelentes Noticias, '+firstName+'!'}</h3>
      <p class="success-subtitle">${lang==='en'?'Your personalized help is on the way':'Su ayuda personalizada va en camino'}</p>
      <ul class="success-bullets">
        <li><span class="sb-icon">\uD83D\uDC69\uD83C\uDFFB\u200D\uD83D\uDCBC</span>${lang==='en'?'A dedicated agent will call you personally':'Una agente dedicada le llamar\u00E1 personalmente'}</li>
        <li><span class="sb-icon">\u2764\uFE0F</span>${lang==='en'?'We are a family team that treats you like family':'Somos un equipo familiar que le trata como familia'}</li>
        <li><span class="sb-icon">\uD83D\uDCB0</span>${lang==='en'?'100% free, zero obligation':'100% gratis, sin compromiso'}</li>
      </ul>
      <button class="success-cta" onclick="hist=[];go(learnHome)">${lang==='en'?'Learn About Medicare':'Aprender Sobre Medicare'}</button>
      <div class="success-links">
        <button onclick="hist=[];go(allPlans)">${lang==='en'?'Back to All Plans':'Ver Todos los Planes'}</button>
        <button onclick="hist=[];D={};selConds=[];priRank=[];selPlans=[];go(startZip)">${lang==='en'?'Start Over':'Empezar de Nuevo'}</button>
      </div>
    </div>`;
  }
