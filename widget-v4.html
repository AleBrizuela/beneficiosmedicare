<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beneficios Medicare - Your Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1E3A5F; --green: #00796B; --blue: #2E6BA4;
  --teal: #00897B; --mint: #B2DFDB;
  --lt-blue: #D6EAF7; --lt-green: #E0F2F1;
  --lt-mint: #E0F2F1; --lt-gray: #F3F5F7;
  --gray: #5A6577; --dark: #1C2B3A; --white: #FFFFFF;
  --sage: #00897B; --sage-dark: #00796B; --slate: #3D5A80;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(30,58,95,0.10);
  --shadow-lg: 0 8px 40px rgba(30,58,95,0.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#E0F2F1 0%,#D6EAF7 50%,#E0F2F1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body.in-iframe{padding:0;min-height:auto;background:var(--white);align-items:flex-start}
body.in-iframe .widget-wrap{border-radius:0;box-shadow:none}
body.in-iframe .widget-header{display:none}
body.in-iframe .widget-footer{display:none}
body.in-iframe .widget-body{padding-top:14px}
.widget-wrap{width:100%;max-width:480px;background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden;position:relative}

/* ── LANG BUBBLE ── */
.lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden;margin-left:auto;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.lang-toggle button{padding:6px 12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;background:transparent;color:rgba(255,255,255,.6);letter-spacing:.03em}
.lang-toggle button.active{background:rgba(255,255,255,.95);color:var(--navy);border-radius:6px}
.lang-toggle button:hover:not(.active){background:rgba(255,255,255,.1);color:white}

/* ── HEADER ── */
.widget-header{background:linear-gradient(135deg,var(--navy) 0%,var(--slate) 100%);padding:14px 20px 12px;color:white;display:flex;align-items:center;gap:12px}
.widget-header .logo-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.widget-header h2{font-size:19px;font-weight:700;line-height:1.2}
.widget-header p{font-size:13px;opacity:.8;margin-top:2px}

/* ── PROGRESS ── */
.progress-bar{height:4px;background:rgba(0,0,0,.05)}
.progress-fill{height:100%;background:var(--sage);transition:width .4s ease;border-radius:0 2px 2px 0}

/* ── BODY ── */
.widget-body{padding:18px 22px 14px}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.widget-body>*{animation:fadeUp .3s ease}

/* ── BOT MSG ── */
.bot-msg{background:none;border-radius:0;padding:4px 0 12px;margin-bottom:6px;font-size:18px;font-weight:600;line-height:1.45;color:var(--dark);text-align:center}
.bot-msg strong{color:var(--green)}
.bot-msg.plain{background:none;border-radius:0;padding:4px 0 10px;font-size:24px;font-weight:700;color:var(--navy);text-align:center}
.bot-msg.hl{background:var(--lt-mint);border-left:4px solid var(--sage);padding:10px 14px;border-radius:8px;text-align:left;font-size:15px;font-weight:500;color:var(--gray)}

/* ── OPT CARDS ── */
.opt-grid{display:flex;flex-direction:column;gap:10px}
.opt-card{display:flex;align-items:center;gap:14px;padding:16px 16px;border:2px solid var(--lt-gray);border-radius:var(--radius);cursor:pointer;transition:all .2s;background:var(--white);min-height:64px}
.opt-card:hover{border-color:var(--sage);background:var(--lt-mint);transform:translateY(-1px);box-shadow:0 2px 10px rgba(0,137,123,.12)}
.opt-card:active{transform:scale(.98)}
.opt-card .ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ic.bl{background:var(--lt-blue)}.ic.gr{background:var(--lt-green)}.ic.mi{background:var(--lt-mint)}.ic.sg{background:#E0F2F1}
.opt-card .tx h4{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:2px}
.opt-card .tx p{font-size:14px;color:var(--gray);line-height:1.45}
.opt-card .bg{margin-left:auto;font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
.bg.st{background:#FFF3E0;color:#E65100}.bg.ch{background:var(--lt-blue);color:var(--blue)}
.bg.co{background:var(--lt-green);color:var(--green)}.bg.le{background:#F3E8FF;color:#7C3AED}

/* ── INPUTS ── */
.input-group{margin-bottom:14px;text-align:center}
.input-group label{display:block;font-size:14px;font-weight:600;color:var(--gray);margin-bottom:6px;text-align:center}
.input-field{width:auto;min-width:180px;max-width:260px;padding:14px 16px;border:2px solid #E2E8F0;border-radius:var(--radius);font-size:18px;font-family:inherit;color:var(--dark);transition:border-color .2s;text-align:center;display:block;margin:0 auto}
.input-field:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(0,137,123,.15)}
.input-field::placeholder{color:#A0AEC0}
.input-group.zip-group .input-field{width:140px;min-width:140px;font-size:22px;letter-spacing:3px}

/* ── BUTTONS ── */
.btn-p{width:100%;padding:16px;background:linear-gradient(135deg,var(--sage) 0%,var(--sage-dark) 100%);color:white;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:52px}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,137,123,.3)}.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-s{width:100%;padding:14px;background:transparent;color:var(--sage);border:2px solid var(--sage);border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:50px}
.btn-s:hover{background:var(--lt-mint)}
.btn-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--gray);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:12px;padding:6px 0;min-height:36px}
.btn-back:hover{color:var(--dark)}
.btn-ghost{background:none;border:none;color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px 0;text-decoration:underline;text-underline-offset:3px;min-height:44px}
.btn-remind{width:100%;padding:14px;background:var(--lt-blue);color:var(--blue);border:2px solid var(--lt-blue);border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;min-height:50px}
.btn-remind:hover{border-color:var(--blue)}
.btn-skip{display:block;width:100%;text-align:center;background:none;border:none;color:#999;font-size:13px;cursor:pointer;font-family:inherit;padding:10px 0;margin-top:4px;text-decoration:underline;text-underline-offset:2px;min-height:36px}
.btn-skip:hover{color:var(--gray)}

/* ── INFO CARDS ── */
.info-card{background:var(--lt-mint);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.info-card h4{font-size:15px;font-weight:700;color:var(--green);margin-bottom:5px}
.info-card p{font-size:15px;color:var(--dark);line-height:1.55}
.info-card.bl{background:var(--lt-blue)}.info-card.bl h4{color:var(--blue)}

/* ── CONDITION CHIPS (Option B) ── */
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cond-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:2px solid #E2E8F0;border-radius:var(--radius);cursor:pointer;transition:all .15s;background:var(--white);text-align:center;min-height:70px}
.cond-chip:hover{border-color:var(--sage);background:var(--lt-mint)}
.cond-chip:active{transform:scale(.96)}
.cond-chip.sel{border-color:var(--sage);background:var(--sage);color:white}
.cond-chip .cond-icon{font-size:24px;line-height:0}
.cond-chip .cond-label{font-size:13px;font-weight:600;line-height:1.3}
.cond-chip.sel .cond-label{color:white}
.cond-chip.sel .cond-icon svg{filter:brightness(0) invert(1)}
.health-textarea{width:100%;padding:12px 14px;border:2px solid #E2E8F0;border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--dark);resize:vertical;min-height:70px;transition:border-color .2s}
.health-textarea:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(0,137,123,.15)}
.health-textarea::placeholder{color:#A0AEC0}

/* ── RANK BADGES (priority step) ── */
.opt-card{position:relative}
.rank-badge{position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;background:var(--sage);color:white;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,137,123,.3);animation:popIn .25s ease}
.opt-card.ranked{border-color:var(--sage);background:var(--lt-mint)}

/* ── PLAN CARDS ── */
.plan-card{border:2px solid #E2E8F0;border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all .2s;position:relative;border-left:5px solid #E2E8F0}
.plan-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.plan-card.rec{border-color:var(--sage);background:var(--lt-mint);border-left-color:var(--sage)}
.plan-label{position:absolute;top:-10px;right:10px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.03em}
.plan-label.best-match{background:var(--sage);color:white}
.plan-label.best-value{background:#2E6BA4;color:white}
.plan-label.most-benefits{background:#7C3AED;color:white}
.plan-label.top-rated{background:#E65100;color:white}
.plan-card h4{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px}
.plan-card .carrier{font-size:13px;color:var(--gray);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.carrier-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.plan-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #EDF2F7}
.plan-row:last-child{border:none}
.plan-row .lb{color:var(--gray)}.plan-row .vl{font-weight:600;color:var(--dark)}
.plan-row .vl.gd{color:var(--green)}
.plan-cta{width:100%;padding:14px;margin-top:10px;border:2px solid var(--sage);background:var(--white);color:var(--sage);border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;min-height:50px}
.plan-cta:hover{background:var(--sage);color:white}
.plan-cta.filled{background:var(--sage);color:white}
.plan-cta.filled:hover{background:var(--sage-dark)}

/* ── PLAN SELECT CHECKBOX ── */
.plan-sel{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:2px solid #CBD5E0;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .15s;z-index:2}
.plan-sel:hover{border-color:var(--sage)}
.plan-sel.checked{background:var(--sage);border-color:var(--sage);color:white}
.compare-float{position:sticky;bottom:0;left:0;right:0;background:white;padding:10px 0 4px;border-top:1px solid #EDF2F7;margin-top:12px;text-align:center}

/* ── COMPARE TABLE ── */
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.compare-table th{background:var(--navy);color:white;padding:9px 6px;text-align:center;font-weight:700;font-size:12px}
.compare-table th:first-child{text-align:left;background:var(--lt-gray);color:var(--dark)}
.compare-table td{padding:8px 6px;border-bottom:1px solid #EDF2F7;text-align:center;color:var(--dark)}
.compare-table td:first-child{text-align:left;color:var(--gray);font-weight:500}
.compare-table tr:hover td{background:var(--lt-mint)}

/* ── COMPARE ROW ── */
.cmp-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #EDF2F7;font-size:15px}
.cmp-row:last-child{border:none}
.cmp-lb{color:var(--gray)}.cmp-vl{font-weight:600;color:var(--dark)}

/* ── SUCCESS ── */
.success-icon{width:88px;height:88px;background:linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(76,175,80,.25);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.success-wrap{text-align:center;padding:20px 8px 12px}
.success-title{color:var(--navy);font-size:22px;font-weight:800;margin:0 0 4px;line-height:1.3}
.success-subtitle{color:var(--teal);font-size:15px;font-weight:600;margin:0 0 16px}
.success-bullets{text-align:left;background:var(--lt-gray);border-radius:var(--radius);padding:14px 16px;margin:0 0 16px;list-style:none}
.success-bullets li{font-size:14px;color:#2D3748;line-height:1.5;padding:5px 0;display:flex;align-items:flex-start;gap:8px}
.success-bullets li span.sb-icon{flex-shrink:0;font-size:16px;margin-top:1px}
.success-cta{display:inline-block;background:var(--teal);color:white;font-size:15px;font-weight:700;padding:13px 28px;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:12px}
.success-cta:hover{background:#1A8A6E;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,138,110,.3)}
.success-links{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.success-links button{background:none;border:none;color:var(--navy);font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;padding:4px}

/* ── FOOTER ── */
.widget-footer{padding:8px 18px 10px;text-align:center;font-size:11px;color:var(--gray);line-height:1.45;border-top:1px solid #EDF2F7}
.widget-footer a{color:var(--blue);text-decoration:none}

/* ── TRUST BAR ── */
.trust-bar{display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:12px;color:#888}
.trust-bar span{display:flex;align-items:center;gap:4px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  body{padding:0;align-items:flex-start}
  .widget-wrap{border-radius:0;min-height:100vh}
  .widget-body{padding:20px 18px}
  .bot-msg{font-size:19px;padding:4px 0 12px}
  .opt-card{padding:18px 16px;min-height:70px}
  .opt-card .ic{width:52px;height:52px;font-size:24px}
  .opt-card .tx h4{font-size:17px}
  .opt-card .tx p{font-size:15px}
  .input-field{padding:16px 18px;font-size:20px}
  .btn-p{padding:18px;font-size:18px;min-height:56px}
  .btn-s{padding:16px;font-size:17px;min-height:54px}
  .plan-row{font-size:15px;padding:8px 0}
  .plan-card h4{font-size:17px}
  .plan-cta{padding:16px;font-size:16px;min-height:54px}
  .cond-chip{padding:16px 8px;min-height:76px}
  .cond-chip .cond-icon{font-size:26px}
  .cond-chip .cond-label{font-size:14px}
}
</style>
</head>

</div>

function dobStep(nextFn){
  prog(15);
  _cb.dob=nextFn;
  const existing = (D.dob_month&&D.dob_day&&D.dob_year) ? `${D.dob_month}/${D.dob_day}/${D.dob_year}` : '';
  wb().innerHTML=`${bk()}

    <div class="input-group"><label>${lang==='en'?'Date of birth':'Fecha de nacimiento'}</label>
    <input class="input-field" type="tel" inputmode="numeric" id="dobInput" placeholder="MM / DD / YYYY" value="${existing}" maxlength="14"
      oninput="formatDob(this)">
    </div>
    ${bp(t('next'),'parseDob();go(_cb.dob)')}
    ${skip(lang==='en'?"I'd rather not say":'Prefiero no decir',"D.dob_month='';D.dob_day='';D.dob_year='';go(_cb.dob)")}`;
  document.getElementById('dobInput')?.focus();
}

function formatDob(el){
  let raw=el.value.replace(/[^\d]/g,'');
  if(raw.length>8) raw=raw.slice(0,8);
  const mm=raw.slice(0,2), dd=raw.slice(2,4), yyyy=raw.slice(4,8);
  let v=mm;
  if(raw.length>2) v+=(' / '+dd);
  if(raw.length>4) v+=(' / '+yyyy);
  el.value=v;
  el.setSelectionRange(v.length,v.length);
}
function parseDob(){
  const v=document.getElementById('dobInput')?.value||'';
  const parts=v.replace(/\s/g,'').split('/');
  if(parts.length===3){
    D.dob_month=parts[0];D.dob_day=parts[1];D.dob_year=parts[2];
  }
}


// ── AGE / ENROLLMENT CALC ──
function getAge(){
  const m=+D.dob_month,d=+D.dob_day,y=+D.dob_year;
  if(!m||!d||!y)return null;
  const now=new Date();let age=now.getFullYear()-y;
  if(now.getMonth()+1<m||(now.getMonth()+1===m&&now.getDate()<d))age--;
  return age;
}
function getEnrollmentWindow(){
  const m=+D.dob_month,d=+D.dob_day,y=+D.dob_year;
  if(!m||!d||!y)return null;
  let iepMonth=m-3, iepYear=y+65;
  if(iepMonth<=0){iepMonth+=12;iepYear--;}
  return {month:iepMonth, year:iepYear};
}
function monthName(m){
  const en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const es=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return (lang==='en'?en:es)[m-1];
}

function ft_eligibility(){
  prog(25);

    go(ft_docAsk);

  }

    wb().innerHTML=`${bk()}

  } else if(ew){
    const opensStr=`<strong>${monthName(ew.month)} ${ew.year}</strong>`;
    const now=new Date();
    const iepDate=new Date(ew.year,ew.month-1,1);

          ${oc(I.disability,'bl',lang==='en'?'Disability (SSDI 24+ months)':'Discapacidad (SSDI 24+ meses)',lang==='en'?'Receiving Social Security disability benefits':'Recibiendo beneficios de discapacidad del Seguro Social','','','_cb.u65dis=()=>{D.under65=\'disability\';go(ft_docAsk)};_cb.u65dis()')}
          ${oc(I.kidney,'gr',lang==='en'?'End-Stage Renal Disease':'Enfermedad Renal Terminal',lang==='en'?'Kidney failure requiring dialysis or transplant':'Insuficiencia renal que requiere di\u00E1lisis o trasplante','','','_cb.u65esrd=()=>{D.under65=\'esrd\';go(ft_docAsk)};_cb.u65esrd()')}
          ${oc(I.brain,'mi',lang==='en'?'ALS (Lou Gehrig\u2019s)':'ELA (Esclerosis Lateral Amiotr\u00F3fica)',lang==='en'?'Diagnosed with amyotrophic lateral sclerosis':'Diagnosticado con esclerosis lateral amiotr\u00F3fica','','','_cb.u65als=()=>{D.under65=\'als\';go(ft_docAsk)};_cb.u65als()')}
        </div>
        ${bs(lang==='en'?'Learn about Medicare':'Aprender sobre Medicare','go(learnHome)')}`;
    } else {
      wb().innerHTML=`${bk()}
        ${bm(lang==='en'?`Your enrollment window opens ${opensStr}!`:`Su ventana de inscripci\u00F3n abre ${opensStr}!`,'hl')}

  }
}

function scorePlans(){
  let plans=[...PLANS];
  const ranked=D.priorities&&D.priorities.length?D.priorities:[D.priority||'benefits'];
  plans.forEach(p=>{
    p.score=0;
    ranked.forEach((pri,idx)=>{
      const w=ranked.length-idx; // 1st pick gets highest weight
      if(pri==='cost')p.score+=w*((6000-p.moop)/1000+(p.premium===0?3:0)+(p.giveback>0?2:0));
      if(pri==='benefits'||pri==='all')p.score+=w*((p.dental+p.vision+p.hearing+p.fitness)+p.otc/50);
      if(pri==='drugs')p.score+=w*(p.drug==='Enhanced'?3:1);
      if(pri==='dental')p.score+=w*((p.dental?3:0)+(p.vision?2:0));
      if(pri==='wellness')p.score+=w*((p.fitness?3:0)+p.otc/30);
      if(pri==='doctor')p.score+=w*(p.type==='PPO'?3:1);
    });
    // Boost for matching conditions
    if(selConds.includes('vision')&&p.vision)p.score+=1;
    if(selConds.includes('bones')&&p.fitness)p.score+=1;
    p.score+=p.rating;
  });
  plans.sort((a,b)=>b.score-a.score);
  plans[0].label=lang==='en'?'Closest Match':'Mayor Coincidencia';plans[0].labelCls='best-match';
  const bv=[...plans].sort((a,b)=>a.moop-b.moop)[0];
  if(bv.id!==plans[0].id){const p=plans.find(x=>x.id===bv.id);p.label=lang==='en'?'Lowest Cost':'Menor Costo';p.labelCls='best-value';}
  const mb=[...plans].sort((a,b)=>(b.dental+b.vision+b.hearing+b.fitness+b.otc/50)-(a.dental+a.vision+a.hearing+a.fitness+a.otc/50))[0];
  if(!mb.label){mb.label=lang==='en'?'Most Included':'M\u00E1s Incluido';mb.labelCls='most-benefits';}
  const tr=[...plans].sort((a,b)=>b.rating-a.rating)[0];
  if(!tr.label){tr.label=lang==='en'?'Highest Rated':'Mayor Calificaci\u00F3n';tr.labelCls='top-rated';}
  return plans;
}

function submitLead(type){
  const name=D.fullName||document.getElementById('fullName')?.value||'';
  const phone=D.phone||document.getElementById('phone')?.value||'';
  const email=D.email||document.getElementById('email')?.value||'';
  const question=document.getElementById('question')?.value||'';

  if(!name||!phone){
    alert(lang==='en'?'Please enter your name and phone number.':'Por favor ingrese su nombre y tel\u00E9fono.');
    return;
  }
  D.fullName=name;D.phone=phone;D.email=email;
  if(question) D.question=question;
  D.lang=lang;D.conditions=[...selConds];
  D.timestamp=new Date().toISOString();
  D.leadType=type;

  const host=window.location.hostname||'';
  const parentHost=(window.self!==window.top)?document.referrer:'';
  const path=window.location.pathname||'';
  if(parentHost.includes('medicare-california')||parentHost.includes('/california')||host.includes('medicare-california')||host.includes('california')||path.includes('/california')){
    D.source='medicare-california';
  } else {
    D.source='beneficiosmedicare';
  }
  D.url=parentHost||window.location.href;

  const parts=name.trim().split(/\s+/);
  D.firstName=parts[0]||'';
  D.lastName=parts.slice(1).join(' ')||'';

  const GS_URL='https://script.google.com/macros/s/AKfycbxgZUyi28Vg5ya__EAzfP3eR1BHmoRwzNva23evP2KzUfAlHtpIgihasIQi3-FFlU7k/exec';
  fetch(GS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(D)}).catch(e=>console.log('lead-err',e));
  console.log('Lead:',JSON.stringify(D,null,2));
  go(flowSuccess);
}

    ${bm(lang==='en'?'What would you like to know?':'\u00BFQu\u00E9 le gustar\u00EDa saber?')}
    <div class="opt-grid">
      ${oc(I.book,'bl',lang==='en'?'Medicare Parts (A,B,C,D)':'Partes de Medicare (A,B,C,D)',lang==='en'?'What each covers.':'Que cubre cada una.','','','go(lParts)')}
      ${oc(I.cost,'gr',lang==='en'?'Costs & Premiums':'Costos y Primas',lang==='en'?'What you will pay.':'Lo que pagar\u00E1.','','','go(lCosts)')}
      ${oc(I.chart,'mi',lang==='en'?'Advantage vs. Supplement':'Advantage vs. Suplemento',lang==='en'?'Which type fits you.':'Cu\u00E1l tipo le conviene.','','','go(lAdvVsMed)')}
      ${oc(I.calendar,'sg',lang==='en'?'Enrollment Periods':'Periodos de Inscripcion',lang==='en'?'When to sign up.':'Cu\u00E1ndo inscribirse.','','','go(lEnroll)')}
    </div>
    <div style="margin-top:12px">${bs(lang==='en'?'I have specific questions':'Tengo preguntas especificas','go(learnContact)')}</div>`;
}
function lParts(){prog(10);wb().innerHTML=`${bk()}${bm(lang==='en'?'Medicare has <strong>4 parts</strong>:':'Medicare tiene <strong>4 partes</strong>:')}${ic(lang==='en'?'Part A - Hospital':'Parte A - Hospital',lang==='en'?'Hospital stays, skilled nursing, hospice. $0 premium for most.':'Estancias en hospital, enfermer\u00EDa, hospicio. $0 prima para la mayor\u00EDa.')}${ic(lang==='en'?'Part B - Medical':'Parte B - M\u00E9dica',lang==='en'?'Doctor visits, outpatient care, preventive services. $185/mo (2025).':'Visitas al doctor, atenci\u00F3n ambulatoria, preventivos. $185/mes (2025).','bl')}${ic(lang==='en'?'Part C - Advantage':'Parte C - Advantage',lang==='en'?'Private plans with A+B+D. Often $0 premium + dental, vision, hearing.':'Planes privados con A+B+D. Frecuentemente $0 prima + dental, visi\u00F3n, audici\u00F3n.')}${ic(lang==='en'?'Part D - Prescriptions':'Parte D - Medicinas',lang==='en'?'Drug coverage. Standalone or in Advantage plans.':'Cobertura de medicinas. Individual o en planes Advantage.','bl')}${bp(lang==='en'?'Find plans in my area':'Encontrar planes en mi \u00E1rea','go(bb_zip)')}${bs(lang==='en'?'More topics':'M\u00E1s temas','go(learnHome)')}`}

function lAdvVsMed(){prog(10);wb().innerHTML=`${bk()}${bm(lang==='en'?'Two main options:':'Dos opciones principales:')}${ic(lang==='en'?'Medicare Advantage':'Medicare Advantage',lang==='en'?'All-in-one. Includes drugs + extras. Lower cost, doctor network.':'Todo-en-uno. Incluye medicinas + extras. Menor costo, red de doctores.')}${ic(lang==='en'?'Medigap (Supplement)':'Medigap (Suplemento)',lang==='en'?'Fills gaps in Original Medicare. Any doctor nationwide. Higher premium.':'Llena huecos en Medicare Original. Cualquier doctor. Prima m\u00E1s alta.','bl')}${bp(lang==='en'?'Compare plans':'Comparar planes','go(bb_zip)')}${bs(lang==='en'?'More topics':'M\u00E1s temas','go(learnHome)')}`}
function lEnroll(){prog(10);wb().innerHTML=`${bk()}${bm(lang==='en'?'<strong>Enrollment periods</strong>:':'<strong>Periodos de inscripcion</strong>:')}${ic(lang==='en'?'Initial (IEP)':'Inicial (IEP)',lang==='en'?'7-month window around your 65th birthday.':'Ventana de 7 meses alrededor de su cumplea\u00F1os 65.')}${ic(lang==='en'?'Annual (AEP)':'Anual (AEP)',lang==='en'?'Oct 15 - Dec 7 every year. Switch plans.':'Oct 15 - Dic 7 cada a\u00F1o. Cambiar planes.','bl')}${ic(lang==='en'?'Special (SEP)':'Especial (SEP)',lang==='en'?'If you moved, lost coverage, or qualify for Extra Help.':'Si se mud\u00F3, perdi\u00F3 cobertura, o califica para Ayuda Extra.')}${bp(lang==='en'?'Check plans now':'Ver planes ahora','go(bb_zip)')}${bs(lang==='en'?'More topics':'M\u00E1s temas','go(learnHome)')}`}
function learnContact(){prog(15);wb().innerHTML=`${bk()}${bm(lang==='en'?'We can answer your questions. <strong>Free, no obligation.</strong>':'Podemos responder sus preguntas. <strong>Gratis, sin compromiso.</strong>')}${inp('fullName',lang==='en'?'Full name':'Nombre completo',lang==='en'?'First and last name':'Nombre y apellido')}${inp('phone',lang==='en'?'Phone':'Telefono','(555) 123-4567','tel')}${inp('email',lang==='en'?'Email (optional)':'Email (opcional)','email@example.com','email')}${inp('question',lang==='en'?'Your question (optional)':'Su pregunta (opcional)',lang==='en'?'What would you like to know?':'\u00BFQu\u00E9 le gustar\u00EDa saber?')}${bp(lang==='en'?'Request Free Call':'Solicitar Llamada Gratis',"submitLead('question')")}`}
